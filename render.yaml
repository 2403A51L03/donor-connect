services:
  - type: web
    name: donor-connect
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run typecheck && pnpm --filter @workspace/blood-donor build && pnpm --filter @workspace/api-server build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: build,runtime
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
      - key: BASE_PATH
        value: "/"
