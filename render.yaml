services:
  - type: web
    name: donor-connect
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: build,runtime
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
