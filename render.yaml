services:
  - type: web
    name: donor-connect
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/blood-donor run build && pnpm --filter @workspace/api-server run build
    startCommand: node -r dotenv/config artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: build,runtime
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
      - key: BASE_PATH
        value: "/"
